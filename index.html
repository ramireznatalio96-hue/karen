<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Karen ❤️</title>

<!-- Preload de la imagen de fondo -->
photo.jpg

<style>
  :root{
    --bg-url: url('photo.jpg');
    --txt-color: #ffffff;
    --glow: #ff2a4f;
    --glow-strong: #ff0033;
    --shadow: rgba(0,0,0,0.35);

    /* Tamaños fluidos y zonas seguras */
    --rose-size: clamp(96px, 22vw, 220px);
    --title-size: clamp(22px, 5.2vw, 44px);
    --bottom-size: clamp(16px, 4.2vw, 28px);
    --safe-gap: clamp(16px, 6vh, 40px);
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    color: var(--txt-color);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #000;     /* Fallback mientras carga la foto */
    overflow: hidden;     /* Evita scroll accidental durante animaciones */
  }

  /* Escenario a pantalla completa con perspectiva 3D */
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;        /* Fallback universal */
    height: 100dvh;       /* Usado si el navegador lo soporta */
    perspective: 1000px;
    overflow: hidden;
    isolation: isolate;   /* Aísla capas para mejor compositing */
  }

  /* Fondo con overlay para legibilidad */
  .bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
      var(--bg-url) center/cover no-repeat fixed;
    z-index: 1;
    will-change: transform;
  }

  /* Texto superior */
  #title {
    position: absolute;
    top: calc(var(--safe-gap) + env(safe-area-inset-top, 0px));
    left: 50%;
    transform: translateX(-50%);
    width: min(92%, 1000px);
    text-align: center;
    font-size: var(--title-size);
    line-height: 1.25;
    text-shadow: 0 0 8px var(--glow), 0 0 18px var(--glow);
    z-index: 50;
  }

  /* Texto inferior */
  #bottomText {
    position: absolute;
    bottom: calc(var(--safe-gap) + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    width: min(92%, 900px);
    text-align: center;
    font-size: var(--bottom-size);
    line-height: 1.25;
    text-shadow: 0 0 10px var(--glow);
    z-index: 50;
    pointer-events: none; /* deja pasar el toque al corazón si se superponen */
  }

  /* Wrapper que garantiza el centrado de la rosa (evita conflictos de transform) */
  #roseWrapper {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;     /* centro vertical */
    justify-content: center; /* centro horizontal */
    z-index: 40;             /* encima de pétalos, debajo de textos */
    pointer-events: none;
  }

  /* Rosa animada (NO usa top/left; solo animación) */
  #rose {
    font-size: var(--rose-size);
    transform-style: preserve-3d;
    text-shadow:
      0 0 5px #ff4d6d,
      0 0 15px var(--glow),
      0 0 30px var(--glow-strong),
      0 6px 18px var(--shadow);
    animation: floatRotateY 6s ease-in-out infinite;
    will-change: transform;
  }

  /* Animación de la rosa: traslación vertical + rotación Y (sin centrar aquí) */
  @keyframes floatRotateY {
    0%   { transform: translateY(0) rotateY(0deg); }
    25%  { transform: translateY(-14px) rotateY(90deg); }
    50%  { transform: translateY(-26px) rotateY(180deg); }
    75%  { transform: translateY(-14px) rotateY(270deg); }
    100% { transform: translateY(0) rotateY(360deg); }
  }

  /* ========= PÉTALOS con animaciones separadas por capas ========= */

  /* TRACK: maneja la caída vertical y el fade */
  .petal-track {
    position: absolute;
    top: -12vh;                 /* comienza encima del viewport */
    opacity: 0;
    z-index: 30;                /* detrás de la rosa */
    will-change: transform, opacity;
    animation: fall var(--fall-dur, 6s) linear var(--fall-delay, 0s) infinite;
  }

  /* SWAY: maneja la deriva horizontal (otra capa, otro transform) */
  .petal-sway {
    will-change: transform;
    animation: sway var(--sway-dur, 3.6s) ease-in-out var(--fall-delay, 0s) infinite;
  }

  /* Pétalo visual (estilo y ligera rotación) */
  .petal {
    width: 14px;
    height: 18px;
    background: radial-gradient(circle at 40% 40%, #ff6a85, #c0163d 65%, #800020 95%);
    border-radius: 50% 50% 60% 60%;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));
    transform: rotate(var(--rot, 0deg));
  }

  /* Caída vertical (usar vh para compatibilidad amplia) */
  @keyframes fall {
    0%   { transform: translateY(0);     opacity: 0; }
    10%  {                               opacity: 1; }
    100% { transform: translateY(112vh); opacity: 0; }
  }

  /* Deriva lateral */
  @keyframes sway {
    0%, 100% { transform: translateX(-12px); }
    50%      { transform: translateX(12px); }
  }

  /* ====== Botón corazón para música (parte inferior) ====== */
  .heart-music {
    position: absolute;
    left: 50%;
    bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    z-index: 60;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
    user-select: none;
    touch-action: manipulation;
  }

  .heart-btn {
    width: 56px;
    height: 50px;
    background: #ff335f;
    position: relative;
    border: none;
    cursor: pointer;
    outline: none;
    transform: rotate(-45deg);
    border-radius: 12px 12px 0 0;
    box-shadow: 0 6px 14px rgba(255, 51, 95, 0.45), 0 2px 4px rgba(0,0,0,0.25);
    transition: transform .1s ease, filter .2s ease, box-shadow .2s ease;
  }

  /* Lóbulos del corazón (pseudo-elementos) */
  .heart-btn::before,
  .heart-btn::after {
    content: "";
    position: absolute;
    width: 56px;
    height: 56px;
    background: #ff335f;
    border-radius: 50%;
    box-shadow: inherit;
  }
  .heart-btn::before { top: -28px; left: 0; }  /* lóbulo superior izquierdo */
  .heart-btn::after  { left: 28px; top: 0; }   /* lóbulo superior derecho */

  /* Pulsito suave */
  @keyframes pulse {
    0%, 100% { transform: rotate(-45deg) scale(1); filter: brightness(1); }
    50%      { transform: rotate(-45deg) scale(1.06); filter: brightness(1.08); }
  }
  .heart-btn { animation: pulse 1.6s ease-in-out infinite; }

  .heart-label {
    font-size: clamp(14px, 3.6vw, 16px);
    opacity: 0.9;
  }

  .heart-wrapper[aria-disabled="true"] .heart-btn {
    cursor: default;
    animation: none;
    filter: grayscale(0.1) brightness(0.9);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }
  .heart-wrapper[aria-disabled="true"] .heart-label {
    opacity: 0.7;
  }

  /* Opcional: Ajuste en landscape (puedes comentar si no lo quieres) */
  @media (orientation: landscape) {
    :root { --rose-size: clamp(96px, 18vw, 220px); }
  }

  /* Accesibilidad: si quieres respetar "Reducir movimiento", descomenta:
  @media (prefers-reduced-motion: reduce) {
    #rose, .petal-track, .petal-sway, .heart-btn { animation: none !important; }
  }
  */
</style>
</head>

<body>
  <div class="stage" role="img" aria-label="Pétalos cayendo sobre una foto de fondo con una rosa brillante centrada.">
    <div class="bg" aria-hidden="true"></div>

    <h1 id="title">Karen, te quiero mucho</h1>

    <!-- Rosa centrada por wrapper flex -->
    <div id="roseWrapper" aria-hidden="true">
      <div id="rose">🌹</div>
    </div>

    <div id="bottomText">Te quiero ver cada minuto</div>

    <!-- ===== Botón corazón (música) en la parte inferior ===== -->
    <div id="heartWrapper" class="heart-wrapper heart-music" role="group" aria-label="Control de música" aria-disabled="false">
      <button id="heartBtn" class="heart-btn" aria-label="Reproducir música"></button>
      <span id="heartLabel" class="heart-label">(click me)</span>
    </div>
  </div>

<!-- ====== SCRIPTS ====== -->
<script>
  // ========= Parámetros de pétalos =========
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const PETAL_COUNT = isMobile ? 28 : 52;

  const DUR_MIN = 5.0, DUR_MAX = 8.0;
  const SWAY_MIN = 3.0, SWAY_MAX = 5.0;
  const ROT_START = [-25, 25];

  const stage = document.querySelector('.stage');

  // Generar estructura anidada: track (caída) -> sway (deriva) -> petal (visual)
  for (let i = 0; i < PETAL_COUNT; i++) {
    const track = document.createElement('div');
    track.className = 'petal-track';
    track.style.left = (Math.random() * 100).toFixed(2) + 'vw';
    track.style.setProperty('--fall-delay', (Math.random() * 4).toFixed(2) + 's');
    track.style.setProperty('--fall-dur', (DUR_MIN + Math.random() * (DUR_MAX - DUR_MIN)).toFixed(2) + 's');

    const sway = document.createElement('div');
    sway.className = 'petal-sway';
    sway.style.setProperty('--sway-dur', (SWAY_MIN + Math.random() * (SWAY_MAX - SWAY_MIN)).toFixed(2) + 's');

    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.setProperty('--rot', (ROT_START[0] + Math.random() * (ROT_START[1] - ROT_START[0])).toFixed(1) + 'deg');

    sway.appendChild(petal);
    track.appendChild(sway);
    stage.appendChild(track);
  }

  // ========= Música: play UNA sola vez al tocar el corazón =========
  // Coloca 'music.mp3' junto a este HTML (o cambia la ruta).
  const audio = new Audio('music.mp3');
  audio.loop = false;          // Una sola reproducción
  audio.preload = 'auto';

  const heartWrapper = document.getElementById('heartWrapper');
  const heartBtn = document.getElementById('heartBtn');
  const heartLabel = document.getElementById('heartLabel');

  let hasPlayed = false;

  const playOnce = async () => {
    if (hasPlayed) return;
    try {
      await audio.play();
      hasPlayed = true;
      heartWrapper.setAttribute('aria-disabled', 'true');
      heartBtn.setAttribute('aria-label', 'Reproduciendo música');
      heartLabel.textContent = 'Reproduciendo…';
    } catch (e) {
      // Si falla (p. ej., restricción del navegador), sugerimos intentar de nuevo
      heartLabel.textContent = 'Toca de nuevo';
      console.warn('No se pudo reproducir audio:', e);
    }
  };

  heartBtn.addEventListener('click', playOnce, { passive: true });

  // Cuando termina el audio, dejamos el botón desactivado (no vuelve a sonar).
  audio.addEventListener('ended', () => {
    heartWrapper.setAttribute('aria-disabled', 'true');
    heartLabel.textContent = 'Gracias ❤️';
  });
</script>
</body>
</html>
