<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Karen ❤️</title>

<!-- Preload de la imagen de fondo -->
photo.jpg

<style>
  :root{
    --bg-url: url('photo.jpg');
    --txt-color: #ffffff;
    --glow: #ff2a4f;
    --glow-strong: #ff0033;
    --shadow: rgba(0,0,0,0.35);

    /* Tamaños fluidos */
    --rose-size: clamp(96px, 22vw, 220px);
    --title-size: clamp(22px, 5.2vw, 44px);
    --bottom-size: clamp(16px, 4.2vw, 28px);
    --safe-gap: clamp(16px, 6vh, 40px);
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    color: var(--txt-color);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #000;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;           /* Fallback universal */
    height: 100dvh;          /* Usado si el navegador lo soporta */
    perspective: 1000px;
    overflow: hidden;
    isolation: isolate;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
      var(--bg-url) center/cover no-repeat fixed;
    z-index: 1;
    will-change: transform;
  }

  #title {
    position: absolute;
    top: var(--safe-gap);
    left: 50%;
    transform: translateX(-50%);
    width: min(92%, 1000px);
    text-align: center;
    font-size: var(--title-size);
    line-height: 1.25;
    text-shadow: 0 0 8px var(--glow), 0 0 18px var(--glow);
    z-index: 50;
  }

  #bottomText {
    position: absolute;
    bottom: var(--safe-gap);
    left: 50%;
    transform: translateX(-50%);
    width: min(92%, 900px);
    text-align: center;
    font-size: var(--bottom-size);
    line-height: 1.25;
    text-shadow: 0 0 10px var(--glow);
    z-index: 50;
  }

  /* Centrado perfecto de la rosa con flex */
  #roseWrapper {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 40;           /* encima de pétalos, debajo de textos */
    pointer-events: none;
  }

  /* La rosa: NO uses position/top/left aquí */
  #rose {
    font-size: var(--rose-size);
    transform-style: preserve-3d;
    text-shadow:
      0 0 5px #ff4d6d,
      0 0 15px var(--glow),
      0 0 30px var(--glow-strong),
      0 6px 18px var(--shadow);
    animation: floatRotateY 6s ease-in-out infinite;
    will-change: transform;
  }

  /* Animación: solo traslación vertical y rotación */
  @keyframes floatRotateY {
    0%   { transform: translateY(0) rotateY(0deg); }
    25%  { transform: translateY(-14px) rotateY(90deg); }
    50%  { transform: translateY(-26px) rotateY(180deg); }
    75%  { transform: translateY(-14px) rotateY(270deg); }
    100% { transform: translateY(0) rotateY(360deg); }
  }

  /* Pétalos (detrás de la rosa) */
  .petal {
    position: absolute;
    width: 14px;
    height: 18px;
    background: radial-gradient(circle at 40% 40%, #ff6a85, #c0163d 65%, #800020 95%);
    border-radius: 50% 50% 60% 60%;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));
    opacity: 0;
    z-index: 30;
    animation:
      fall var(--fall-dur, 6s) linear var(--fall-delay, 0s) infinite,
      sway var(--sway-dur, 3.6s) ease-in-out var(--fall-delay, 0s) infinite;
    will-change: transform, opacity;
  }

  /* IMPORTANTE: usar vh para máxima compatibilidad */
  @keyframes fall {
    0%   { transform: translate3d(var(--x, 0), -12vh, 0) rotate(var(--rot, 0deg)); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translate3d(var(--x, 0), 112vh, 0) rotate(calc(var(--rot, 0deg) + 180deg)); opacity: 0; }
  }

  @keyframes sway {
    0%, 100% { transform: translateX(-12px); }
    50%      { transform: translateX(12px); }
  }

  /* ⚠️ Si quieres respetar accesibilidad, descomenta:
  @media (prefers-reduced-motion: reduce) {
    #rose, .petal { animation: none !important; }
  }
  */
</style>
</head>

<body>
  <div class="stage" role="img" aria-label="Pétalos cayendo sobre una foto de fondo con una rosa brillante centrada.">
    <div class="bg" aria-hidden="true"></div>

    <h1 id="title">Karen, te quiero mucho</h1>

    <div id="roseWrapper" aria-hidden="true">
      <div id="rose">🌹</div>
    </div>

    <div id="bottomText">Te quiero ver cada minuto</div>
  </div>

<script>
  // ========= Parámetros =========
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const PETAL_COUNT = isMobile ? 28 : 52;

  const DUR_MIN = 5.0, DUR_MAX = 8.0;
  const SWAY_MIN = 3.0, SWAY_MAX = 5.0;
  const ROT_START = [-25, 25];
  const X_DRIFT = [-20, 20];

  const stage = document.querySelector('.stage');

  // Generar pétalos dentro de .stage (respeta las capas con z-index)
  for (let i = 0; i < PETAL_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'petal';

    // Ancho relativo a viewport; si quieres ultra compatible, usa % sobre stage
    p.style.left = (Math.random() * 100).toFixed(2) + 'vw';

    // Desfase de inicio
    p.style.setProperty('--fall-delay', (Math.random() * 4).toFixed(2) + 's');

    // Duraciones
    p.style.setProperty('--fall-dur', (DUR_MIN + Math.random() * (DUR_MAX - DUR_MIN)).toFixed(2) + 's');
    p.style.setProperty('--sway-dur', (SWAY_MIN + Math.random() * (SWAY_MAX - SWAY_MIN)).toFixed(2) + 's');

    // Rotación base y deriva extra en X
    p.style.setProperty('--rot', (ROT_START[0] + Math.random() * (ROT_START[1] - ROT_START[0])).toFixed(1) + 'deg');
    p.style.setProperty('--x', (X_DRIFT[0] + Math.random() * (X_DRIFT[1] - X_DRIFT[0])).toFixed(1) + 'px');

    stage.appendChild(p);
  }
</script>
</body>
</html>
